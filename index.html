<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrick & Becky — Sprint Triathlon 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --warm-bg: #FDF8F4;
    --patrick: #B94A3E;
    --becky: #B76E79;
    --joint: #2E86AB;
    --gold: #B8860B;
    --swim: #1565C0; --swim-bg: #E3F2FD; --swim-border: #64B5F6;
    --bike: #E67E22; --bike-bg: #FFF3E0; --bike-border: #FFB74D;
    --run: #2E7D32; --run-bg: #E8F5E9; --run-border: #81C784;
    --weights: #7B1FA2; --weights-bg: #F3E5F5; --weights-border: #CE93D8;
    --misc: #00838F; --misc-bg: #E0F7FA; --misc-border: #4DD0E1;
    --race: #E65100; --race-bg: #FFF9C4; --race-border: #FFD54F;
    --text: #2C2420; --text-muted: #8C7B6F; --text-light: #B5A89E;
    --card-bg: rgba(255,255,255,0.72); --card-border: rgba(0,0,0,0.04);
    --display-font: 'Playfair Display', Georgia, serif;
    --body-font: 'Crimson Pro', Georgia, serif;
    --ui-font: 'DM Sans', system-ui, sans-serif;
  }
  body { font-family: var(--body-font); background: var(--warm-bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 10%, rgba(185,74,62,0.04) 0%, transparent 55%), radial-gradient(ellipse at 80% 90%, rgba(183,110,121,0.04) 0%, transparent 55%), radial-gradient(ellipse at 50% 50%, rgba(184,134,11,0.02) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .container { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 20px; }

  .hero { text-align: center; padding: 52px 0 36px; }
  .hero__eyebrow { font-family: var(--ui-font); font-size: 12px; font-weight: 700; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; }
  .hero__title { font-family: var(--display-font); font-size: clamp(38px, 8vw, 60px); font-weight: 800; line-height: 1.05; letter-spacing: -1.5px; background: linear-gradient(140deg, var(--patrick) 0%, #D4634E 35%, var(--gold) 65%, var(--becky) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; }
  .hero__subtitle { font-family: var(--body-font); font-size: clamp(18px, 3.5vw, 24px); font-weight: 300; font-style: italic; color: var(--text-muted); }

  .stats-bar { display: flex; justify-content: center; gap: 36px; margin: 28px 0 8px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat__label { font-family: var(--ui-font); font-size: 10px; font-weight: 700; letter-spacing: 3px; color: var(--text-light); text-transform: uppercase; margin-bottom: 2px; }
  .stat__value { font-size: 22px; font-weight: 600; }
  .stat__value--swim { color: var(--swim); }
  .stat__value--bike { color: var(--bike); }
  .stat__value--run { color: var(--run); }
  .stat__arrow { color: #ddd; font-size: 22px; align-self: center; }


  /* Who am I banner */
  .who-bar {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 16px 24px;
    margin-bottom: 24px;
    border: 1px solid var(--card-border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.03);
    text-align: center;
  }
  .who-bar__label {
    font-family: var(--ui-font);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-light);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .who-bar__btns { display: flex; justify-content: center; gap: 12px; }
  .who-btn {
    font-family: var(--ui-font);
    font-size: 14px;
    font-weight: 700;
    padding: 10px 32px;
    border-radius: 100px;
    border: 2px solid #ddd;
    cursor: pointer;
    transition: all 0.3s ease;
    background: #fff;
    color: var(--text-muted);
  }
  .who-btn:hover { border-color: #bbb; }
  .who-btn.active--patrick { background: var(--patrick); color: #fff; border-color: var(--patrick); box-shadow: 0 4px 16px rgba(185,74,62,0.25); }
  .who-btn.active--becky { background: var(--becky); color: #fff; border-color: var(--becky); box-shadow: 0 4px 16px rgba(183,110,121,0.25); }

  .progress-section { background: var(--card-bg); border-radius: 20px; padding: 24px 28px; margin-bottom: 32px; border: 1px solid var(--card-border); box-shadow: 0 2px 16px rgba(0,0,0,0.03); }
  .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .progress-header__title { font-family: var(--display-font); font-size: 20px; font-weight: 700; }
  .progress-header__pct { font-family: var(--ui-font); font-size: 14px; font-weight: 700; color: var(--gold); }
  .progress-track { height: 10px; background: #F0EBE5; border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--patrick), var(--gold), var(--becky)); transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
  .progress-people { display: flex; gap: 20px; margin-top: 14px; flex-wrap: wrap; }
  .progress-person { font-family: var(--ui-font); font-size: 13px; color: var(--text-muted); }
  .progress-person strong { font-weight: 700; }
  .progress-person--patrick strong { color: var(--patrick); }
  .progress-person--becky strong { color: var(--becky); }
  .progress-person--joint strong { color: var(--joint); }

  .filter-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
  .filter-btn { font-family: var(--ui-font); font-size: 12px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; padding: 10px 22px; border-radius: 100px; border: none; cursor: pointer; transition: all 0.3s ease; background: rgba(255,255,255,0.5); color: var(--text-light); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .filter-btn:hover { background: rgba(255,255,255,0.8); color: var(--text-muted); }
  .filter-btn.active { background: linear-gradient(135deg, var(--patrick), #D4634E); color: #fff; box-shadow: 0 4px 18px rgba(185,74,62,0.2); font-weight: 700; }

  .timeline { position: relative; padding-bottom: 48px; }
  .timeline__line { position: absolute; left: 19px; top: 0; bottom: 48px; width: 2px; background: linear-gradient(to bottom, rgba(185,74,62,0.12), rgba(183,110,121,0.12), rgba(184,134,11,0.06)); border-radius: 1px; }

  .week { position: relative; margin-bottom: 10px; animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .week__dot { position: absolute; left: 12px; top: 18px; width: 16px; height: 16px; border-radius: 50%; z-index: 2; transition: all 0.3s ease; border: 3px solid transparent; }
  .week--race .week__dot { width: 20px; height: 20px; left: 10px; background: linear-gradient(135deg, #FFD700, #FFA000) !important; border-color: rgba(255,160,0,0.3) !important; box-shadow: 0 0 18px rgba(255,215,0,0.35); }

  .week__card { margin-left: 48px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--card-border); cursor: pointer; transition: all 0.3s ease; overflow: hidden; }
  .week__card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.07); }
  .week__card.expanded { background: rgba(255,255,255,0.95); box-shadow: 0 8px 36px rgba(0,0,0,0.07); }
  .week--race .week__card { background: linear-gradient(135deg, #FFFDE7, #FFF8E1); border: 2px solid #FFD54F; box-shadow: 0 4px 24px rgba(255,215,0,0.12); }

  .week__header { padding: 14px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .week__phase { font-family: var(--ui-font); font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; border-radius: 100px; }
  .week__number { font-family: var(--display-font); font-size: 17px; font-weight: 700; color: var(--text); }
  .week__dates { font-family: var(--ui-font); font-size: 12px; color: var(--text-light); margin-left: auto; }
  .week__chevron { font-size: 11px; color: #ccc; transition: transform 0.3s ease; }
  .week__card.expanded .week__chevron { transform: rotate(180deg); }

  .week__preview { display: flex; gap: 6px; padding: 0 20px 14px; flex-wrap: wrap; }
  .preview-pip { font-size: 14px; background: #f7f4f0; border-radius: 8px; padding: 2px 8px; display: flex; align-items: center; gap: 2px; }
  .preview-pip__tag { font-family: var(--ui-font); font-size: 8px; font-weight: 800; }
  .preview-pip__tag--p { color: var(--patrick); }
  .preview-pip__tag--b { color: var(--becky); }
  .preview-pip__tag--j { color: var(--joint); }

  .week__complete-badge { font-family: var(--ui-font); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--run); background: var(--run-bg); padding: 2px 8px; border-radius: 100px; }

  .week__desc { margin-bottom: 16px; }
  .week__desc-text { font-family: var(--body-font); font-size: 14px; line-height: 1.6; color: var(--text-muted); font-style: italic; padding: 12px 16px; background: rgba(255,249,230,0.5); border-radius: 12px; border-left: 3px solid var(--gold); }
  .week__desc-text .nutri { display: block; margin-top: 8px; font-style: normal; font-family: var(--ui-font); font-size: 12px; font-weight: 600; color: var(--gold); }

  .week__body { padding: 0 20px 20px; }
  .person-label { font-family: var(--ui-font); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding-bottom: 6px; margin-bottom: 12px; border-bottom: 1px solid; }
  .person-label--joint { color: var(--joint); border-color: rgba(46,134,171,0.15); }
  .person-label--patrick { color: var(--patrick); border-color: rgba(185,74,62,0.1); margin-top: 16px; }
  .person-label--becky { color: var(--becky); border-color: rgba(183,110,121,0.12); margin-top: 16px; }

  .session { border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border-left: 3px solid; transition: background 0.2s ease; display: flex; gap: 12px; align-items: flex-start; }
  .session:hover { filter: brightness(0.98); }
  .session--swim { border-color: var(--swim-border); background: rgba(227,242,253,0.4); }
  .session--swim:hover { background: var(--swim-bg); }
  .session--bike { border-color: var(--bike-border); background: rgba(255,243,224,0.4); }
  .session--bike:hover { background: var(--bike-bg); }
  .session--run { border-color: var(--run-border); background: rgba(232,245,233,0.4); }
  .session--run:hover { background: var(--run-bg); }
  .session--weights { border-color: var(--weights-border); background: rgba(243,229,245,0.4); }
  .session--weights:hover { background: var(--weights-bg); }
  .session--misc { border-color: var(--misc-border); background: rgba(224,247,250,0.4); }
  .session--misc:hover { background: var(--misc-bg); }
  .session--race { border-color: var(--race-border); background: rgba(255,249,196,0.5); }
  .session--race:hover { background: var(--race-bg); }

  .session__check { flex-shrink: 0; width: 22px; height: 22px; border-radius: 6px; border: 2px solid #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s ease; margin-top: 2px; background: #fff; }
  .session__check:hover { border-color: var(--gold); }
  .session__check.checked { background: linear-gradient(135deg, var(--patrick), var(--becky)); border-color: transparent; box-shadow: 0 2px 8px rgba(185,74,62,0.2); }
  .session__check.checked::after { content: '\2713'; color: #fff; font-size: 13px; font-weight: 700; }
  .session.completed { opacity: 0.55; }
  .session.completed .session__label { text-decoration: line-through; }

  .session__content { flex: 1; min-width: 0; }
  .session__top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .session__icon { font-size: 18px; }
  .session__day { font-family: var(--ui-font); font-size: 11px; color: var(--text-light); font-weight: 600; min-width: 32px; }
  .session__label { font-family: var(--ui-font); font-size: 14px; font-weight: 600; transition: all 0.2s ease; }
  .session--swim .session__label { color: var(--swim); }
  .session--bike .session__label { color: var(--bike); }
  .session--run .session__label { color: var(--run); }
  .session--weights .session__label { color: var(--weights); }
  .session--misc .session__label { color: var(--misc); }
  .session--race .session__label { color: var(--race); }
  .session__details { font-family: var(--body-font); font-size: 14px; color: var(--text-muted); margin-top: 5px; line-height: 1.55; }
  .session__joint-badge { display: inline-block; font-family: var(--ui-font); font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #fff; background: var(--joint); padding: 2px 7px; border-radius: 100px; }

  .reset-bar { text-align: center; padding-bottom: 48px; }
  .reset-btn { font-family: var(--ui-font); font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-light); background: none; border: 1px solid rgba(0,0,0,0.08); border-radius: 100px; padding: 8px 20px; cursor: pointer; transition: all 0.2s ease; }
  .reset-btn:hover { color: var(--patrick); border-color: rgba(185,74,62,0.2); }

  .phase--foundation { background: #E8F5E9; color: #2E7D32; }
  .phase--build { background: #FFF3E0; color: #E65100; }
  .phase--peak { background: #FCE4EC; color: #C62828; }
  .phase--sharpen { background: #E8EAF6; color: #283593; }
  .phase--taper { background: #F3E5F5; color: #6A1B9A; }
  .phase--race { background: #FFF9C4; color: #F57F17; }
  .dot--foundation { background: #81C784; border-color: rgba(46,125,50,0.2); }
  .dot--build { background: #FFB74D; border-color: rgba(230,81,0,0.2); }
  .dot--peak { background: #F48FB1; border-color: rgba(198,40,40,0.2); }
  .dot--sharpen { background: #9FA8DA; border-color: rgba(40,53,147,0.2); }
  .dot--taper { background: #CE93D8; border-color: rgba(106,27,154,0.2); }

  /* Toast notification */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    font-family: var(--ui-font); font-size: 14px; font-weight: 600;
    background: var(--text); color: #fff; padding: 12px 24px; border-radius: 100px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2); z-index: 100;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
    opacity: 0; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  @media (max-width: 500px) {
    .stats-bar { gap: 18px; }
    .week__header { padding: 12px 14px; }
    .week__body { padding: 0 14px 16px; }
    .session { padding: 10px 12px; }
    .filter-btn { padding: 8px 16px; font-size: 11px; }
    .who-btn { padding: 8px 24px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero__eyebrow">Sprint Triathlon &middot; 25 July 2026</div>
    <h1 class="hero__title">Patrick &amp; Becky</h1>
    <div class="hero__subtitle" id="countdown"></div>
    <script>
      (function(){
        const raceDate = new Date(2026, 6, 25); // July 25, 2026
        const now = new Date();
        const diff = Math.ceil((raceDate - now) / (1000 * 60 * 60 * 24));
        const el = document.getElementById("countdown");
        if (diff > 0) {
          el.textContent = diff + " days to race day";
        } else if (diff === 0) {
          el.innerHTML = "\uD83C\uDFC6 RACE DAY! GO SMASH IT! \uD83C\uDFC6";
        } else {
          el.textContent = "Race complete!";
        }
      })();
    </script>
    <div class="stats-bar">
      <div class="stat"><div class="stat__label">Swim</div><div class="stat__value stat__value--swim">750m</div></div>
      <div class="stat__arrow">&rarr;</div>
      <div class="stat"><div class="stat__label">Bike</div><div class="stat__value stat__value--bike">20km</div></div>
      <div class="stat__arrow">&rarr;</div>
      <div class="stat"><div class="stat__label">Run</div><div class="stat__value stat__value--run">5km</div></div>
    </div>
  </div>

  <!-- Pace gauges -->
  <div id="pace-gauges" style="background:var(--card-bg);border-radius:20px;padding:28px 20px 20px;border:1px solid var(--card-border);margin-bottom:24px;box-shadow:0 2px 16px rgba(0,0,0,0.03);"></div>

  <div class="progress-section" id="progress-section"></div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="both">Both</button>
    <button class="filter-btn" data-filter="patrick">Patrick</button>
    <button class="filter-btn" data-filter="becky">Becky</button>
  </div>

  <div class="timeline" id="timeline"><div class="timeline__line"></div></div>

  <div class="reset-bar">
    <button class="reset-btn" id="reset-btn">Reset All Progress</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
}

// ── Firebase sync ──
progressRef.on("value", (snap) => {
  const data = snap.val() || {};
  const oldChecked = { ...checked };
  checked = data;
  isLive = true;

  // Check for new completions by the other person (for in-app notification)
  if (!suppressNotify && currentUser) {
    for (const k in data) {
      if (!oldChecked[k] && data[k] && data[k] !== currentUser) {
        // The other person just completed something
        const parts = k.split("-");
        const wi = parseInt(parts[0]);
        const group = parts[1];
        const si = parseInt(parts[2]);
        const w = WEEKS[wi];
        if (w && w[group] && w[group][si]) {
          const s = w[group][si];
          const who = data[k] === "patrick" ? "Patrick" : "Becky";
          const toastHypes = data[k] === "becky" ? BECKY_HYPES : PATRICK_HYPES;
          const toastHype = toastHypes[Math.floor(Math.random() * toastHypes.length)];
          showToast(toastHype);
        }
      }
    }
  }
  suppressNotify = false;
  render();
});

function toggleSession(sessionKey, sessionLabel, sessionType) {
  if (!currentUser) {
    showToast("Pick who you are first! \u261D");
    return;
  }
  const wasChecked = !!checked[sessionKey];
  if (wasChecked) {
    progressRef.child(sessionKey).remove();
  } else {
    // Store who completed it
    progressRef.child(sessionKey).set(currentUser);
    // Send push notification via ntfy
    sendNotification(sessionLabel, sessionType);
  }
}

  if (!currentUser) return;
  const isBecky = currentUser === "becky";
  const who = isBecky ? "Becky" : "Patrick";
  const hypes = isBecky ? BECKY_HYPES : PATRICK_HYPES;
  const hype = hypes[Math.floor(Math.random() * hypes.length)];

  fetch(NTFY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      topic: NTFY_TOPIC,
      title: hype,
      message: who + " completed: " + label,
      tags: [isBecky ? "peach" : (type || "white_check_mark")]
    })
  })
  .then(r => { if (!r.ok) console.error("ntfy error:", r.status, r.statusText); })
  .catch(err => console.error("ntfy fetch failed:", err));
}

function sk(w, g, s) { return w + "-" + g + "-" + s; }

function counts() {

  WEEKS.forEach((w,i) => {
    w.joint.forEach((_,s) => { j++; if(checked[sk(i,"joint",s)]) jd++; });
    w.patrick.forEach((_,s) => { p++; if(checked[sk(i,"patrick",s)]) pd++; });
    w.becky.forEach((_,s) => { b++; if(checked[sk(i,"becky",s)]) bd++; });
  });
  return {p,pd,b,bd,j,jd};
}

function renderProgress() {
  const c = counts(), total = c.p+c.b+c.j, done = c.pd+c.bd+c.jd, pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("progress-section").innerHTML = `
    <div class="progress-header"><div class="progress-header__title">Training Progress</div><div class="progress-header__pct">${pct}%</div></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-people">
      <div class="progress-person progress-person--joint"><strong>Joint:</strong> ${c.jd}/${c.j}</div>
      <div class="progress-person progress-person--patrick"><strong>Patrick:</strong> ${c.pd}/${c.p}</div>
      <div class="progress-person progress-person--becky"><strong>Becky:</strong> ${c.bd}/${c.b}</div>
    </div>
    </div>`;
}

function sesHTML(wi, g, s, si) {
  const k = sk(wi,g,si), done = !!checked[k], isJ = g === "joint";
  const whoCompleted = done ? checked[k] : null;
  const completedBy = whoCompleted && isJ ? ` (${whoCompleted === "patrick" ? "Patrick" : "Becky"})` : "";
  return `<div class="session session--${s.type} ${done?"completed":""}">
    <div class="session__check ${done?"checked":""}" data-key="${k}" data-label="${s.label.replace(/"/g,"&quot;")}" data-type="${s.type}"></div>
    <div class="session__content">
      <div class="session__top">
        <span class="session__icon">${ICONS[s.type]||""}</span>
        <span class="session__day">${s.day}</span>
        <span class="session__label">${s.label}</span>
        ${isJ ? '<span class="session__joint-badge">\uD83E\uDD1D Together</span>' : ""}
      </div>
      <div class="session__details">${s.details}${completedBy ? "<br><em style='font-size:12px;color:var(--joint)'>Completed by " + completedBy + "</em>" : ""}</div>
    </div></div>`;
}

function weekDone(wi) {
  const w = WEEKS[wi], gs = filter === "both" ? ["joint","patrick","becky"] : ["joint", filter];
  let any = false;
  for (const g of gs) { for (let s=0; s<w[g].length; s++) { any=true; if (!checked[sk(wi,g,s)]) return false; } }
  return any;
}

function renderTimeline() {
  const el = document.getElementById("timeline");
  let h = '<div class="timeline__line"></div>';
  WEEKS.forEach((w,i) => {
    const race = w.phase === "Race Week", exp = expanded.has(i), ph = PHASE_CSS[w.phase] || "foundation", done = weekDone(i);
    const jS = w.joint, pS = filter !== "becky" ? w.patrick : [], bS = filter !== "patrick" ? w.becky : [];
    let prev = "";
    if (!exp) {
      prev = '<div class="week__preview">';
      jS.forEach(s => { prev += `<span class="preview-pip">${ICONS[s.type]}<span class="preview-pip__tag preview-pip__tag--j">\uD83E\uDD1D</span></span>`; });
      pS.forEach(s => { prev += `<span class="preview-pip">${ICONS[s.type]}${filter==="both"?'<span class="preview-pip__tag preview-pip__tag--p">P</span>':""}</span>`; });
      bS.forEach(s => { prev += `<span class="preview-pip">${ICONS[s.type]}${filter==="both"?'<span class="preview-pip__tag preview-pip__tag--b">B</span>':""}</span>`; });
      prev += "</div>";
    }
    let body = "";
    if (exp) {
      body = '<div class="week__body">';
      body += `<div class="week__desc"><div class="week__desc-text">${w.desc}<span class="nutri">\uD83C\uDF7D ${w.nutrition}</span></div></div>`;
      if (jS.length) { body += '<div class="person-label person-label--joint">Joint Sessions</div>'; jS.forEach((s,si) => { body += sesHTML(i,"joint",s,si); }); }
      if (filter !== "becky" && pS.length) { body += '<div class="person-label person-label--patrick">Patrick Solo</div>'; pS.forEach((s,si) => { body += sesHTML(i,"patrick",s,si); }); }
      if (filter !== "patrick" && bS.length) { body += '<div class="person-label person-label--becky">Becky Solo</div>'; bS.forEach((s,si) => { body += sesHTML(i,"becky",s,si); }); }
      body += "</div>";
    }
    h += `<div class="week ${race?"week--race":""}" style="animation-delay:${Math.min(i*0.03,0.5)}s">
      <div class="week__dot dot--${ph}"></div>
      <div class="week__card ${exp?"expanded":""}" data-week="${i}">
        <div class="week__header">
          <span class="week__phase phase--${ph}">${w.phase}</span>
          <span class="week__number">${race?"\uD83C\uDFC6 Race Week!":"Week "+w.week}</span>
          ${done&&!race?'<span class="week__complete-badge">\u2713 Done</span>':""}
          <span class="week__dates">${w.dates}</span>
          <span class="week__chevron">\u25BC</span>
        </div>${prev}${body}
      </div></div>`;
  });
  el.innerHTML = h;
}

function render() { renderPaceGauges(); renderProgress(); renderTimeline(); }

// ── Pace gauges (arc style) ──
function renderPaceGauges() {
  const P_START = 122.5, P_TARGET = 89, B_START = 143.6, B_TARGET = 125;
  const planStart = new Date(2026, 2, 23);
  const planEnd = new Date(2026, 6, 25);
  const now = new Date();
  const timeProgress = Math.max(0, Math.min(1, (now - planStart) / (planEnd - planStart)));
  const c = counts();
  const totalS = c.p + c.b + c.j, doneS = c.pd + c.bd + c.jd;
  const sessionProgress = totalS > 0 ? doneS / totalS : 0;
  const progress = Math.min(1, timeProgress * 0.4 + sessionProgress * 0.6);

  const pNow = P_START - (P_START - P_TARGET) * progress;
  const bNow = B_START - (B_START - B_TARGET) * progress;

  const weeksIn = Math.max(1, Math.min(18, Math.ceil((now - planStart) / (7*24*60*60*1000))));

  function fmtTime(m) {
    const h = Math.floor(m/60), mn = Math.round(m%60);
    return h > 0 ? h+"h"+(mn<10?"0":"")+mn : mn+"m";
  }

  function gauge(name, color, start, target, est, goalLabel) {
    const pct = Math.max(0, Math.min(1, (start - est) / (start - target)));
    const cx=90, cy=82, r=68;
    // Arc from ~150deg to ~30deg (bottom open)
    const SA = Math.PI * 0.83, EA = Math.PI * 0.17;
    const totalArc = 2*Math.PI - (SA - EA);
    const pol = (a) => ({x: cx + r*Math.cos(a), y: cy + r*Math.sin(a)});
    const as = pol(SA), ae = pol(EA);
    const pa = SA - pct * totalArc;
    const pe = pol(pa);
    const la = pct * totalArc > Math.PI ? 1 : 0;
    return `
      <div style="text-align:center;flex:1;min-width:155px;">
        <div style="font-family:var(--ui-font);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:${color};margin-bottom:2px;">${name}</div>
        <svg viewBox="0 0 180 115" style="width:100%;max-width:210px;">
          <path d="M ${as.x} ${as.y} A ${r} ${r} 0 1 0 ${ae.x} ${ae.y}" fill="none" stroke="#EDEBE8" stroke-width="11" stroke-linecap="round"/>
          ${pct > 0.005 ? `<path d="M ${as.x} ${as.y} A ${r} ${r} 0 ${la} 0 ${pe.x} ${pe.y}" fill="none" stroke="${color}" stroke-width="11" stroke-linecap="round" style="filter:drop-shadow(0 2px 8px ${color}35);"/>` : ""}
          <circle cx="${pct>0.005?pe.x:as.x}" cy="${pct>0.005?pe.y:as.y}" r="7" fill="${color}" stroke="#fff" stroke-width="3"/>
          <text x="${cx}" y="${cy-6}" text-anchor="middle" font-family="'Playfair Display',serif" font-size="28" font-weight="800" fill="${color}">${fmtTime(est)}</text>
          <text x="${cx}" y="${cy+12}" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" font-weight="600" fill="#B5A89E" letter-spacing="1.2">EST. RACE TIME</text>
          <text x="${as.x-6}" y="${as.y+15}" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8.5" fill="#ccc">${fmtTime(start)}</text>
          <text x="${ae.x+6}" y="${ae.y+15}" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8.5" fill="#ccc">${fmtTime(target)}</text>
        </svg>
        <div style="font-family:var(--ui-font);font-size:11px;color:var(--text-light);margin-top:-2px;">Target: <strong style="color:${color}">${goalLabel}</strong></div>
      </div>`;
  }

  document.getElementById("pace-gauges").innerHTML = `
    <div style="font-family:var(--display-font);font-size:18px;font-weight:700;color:var(--text);text-align:center;margin-bottom:8px;">Estimated Race Pace</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
      ${gauge("Patrick","#B94A3E",P_START,P_TARGET,pNow,"sub 1h30")}
      ${gauge("Becky","#B76E79",B_START,B_TARGET,bNow,"sub 2h15")}
    </div>
    <div style="font-family:var(--ui-font);font-size:10px;color:var(--text-light);text-align:center;margin-top:8px;letter-spacing:0.3px;">Week ${weeksIn}/18 \u00b7 Updates with time + sessions completed</div>`;
}

// ── Events ──
document.addEventListener("click", e => {
  const ch = e.target.closest(".session__check");
  if (ch) {
    e.stopPropagation();
    toggleSession(ch.dataset.key, ch.dataset.label, ch.dataset.type);
    return;
  }
  const card = e.target.closest(".week__card");
  if (card && !e.target.closest(".session__check")) {
    const wi = +card.dataset.week;
    expanded.has(wi) ? expanded.delete(wi) : expanded.add(wi);
    render();
    return;
  }
  const fb = e.target.closest(".filter-btn");
  if (fb) {
    filter = fb.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    fb.classList.add("active");
    render();
  }
});

document.getElementById("reset-btn").addEventListener("click", () => {
  if (confirm("Reset ALL progress for BOTH of you? This can\u2019t be undone.")) {
    progressRef.remove();
    showToast("Progress reset!");
  }
});

// Init
updateWhoBar();
render();
</script>
</body>
</html>
